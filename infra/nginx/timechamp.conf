# --- VM2: Web Dashboard + API proxy ----------------------------------------
server {
    listen 80;
    server_name timechamp.io www.timechamp.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name timechamp.io www.timechamp.io;

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Next.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API proxy
    location /api/ {
        proxy_pass http://VM1_INTERNAL_IP:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / Socket.IO passthrough to VM1
    location /socket.io/ {
        proxy_pass http://VM1_INTERNAL_IP:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# --- VM1: API server (internal listener, Cloudflare proxies via VM2) --------
# NestJS listens directly on 0.0.0.0:3001 (no NGINX on VM1 needed for API)
# PgBouncer listens on 127.0.0.1:6432
