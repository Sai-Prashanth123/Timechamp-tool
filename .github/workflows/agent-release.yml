name: Agent Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  suffix: linux-amd64   }
          - { goos: linux,   goarch: arm64,  suffix: linux-arm64   }
          - { goos: darwin,  goarch: amd64,  suffix: darwin-amd64  }
          - { goos: darwin,  goarch: arm64,  suffix: darwin-arm64  }
          - { goos: windows, goarch: amd64,  suffix: windows-amd64, ext: .exe }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum

      - name: Build agent binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          cd apps/agent
          go build \
            -ldflags "-X main.Version=${{ github.ref_name }} -X main.BuildDate=$(date -u +%Y-%m-%d)" \
            -o timechamp-agent-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/agent

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/agent/timechamp-agent-${{ matrix.suffix }}${{ matrix.ext || '' }}
          generate_release_notes: true
