name: Agent Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Create the GitHub release first (prevents race conditions) ──────────────
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release for ${{ github.ref_name }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false || true
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Headless agent binaries (cross-compiled, CGO_ENABLED=0) ────────────────
  build-agent:
    name: Agent ${{ matrix.suffix }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  suffix: linux-amd64             }
          - { goos: linux,   goarch: arm64,  suffix: linux-arm64             }
          - { goos: darwin,  goarch: amd64,  suffix: darwin-amd64            }
          - { goos: darwin,  goarch: arm64,  suffix: darwin-arm64            }
          - { goos: windows, goarch: amd64,  suffix: windows-amd64, ext: .exe }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum

      - name: Build agent binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          cd apps/agent
          go build \
            -ldflags "-w -s -X main.Version=${{ github.ref_name }} -X main.BuildDate=$(date -u +%Y-%m-%d)" \
            -o timechamp-agent-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/agent

      - name: Upload to release
        shell: bash
        run: |
          cd apps/agent
          gh release upload "${{ github.ref_name }}" \
            timechamp-agent-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Desktop tray app (Wails v2 native window + system tray) ────────────────
  # Requires native runners — Wails needs the platform's webview toolkit (CGO).
  build-tray:
    name: Tray ${{ matrix.suffix }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { runner: windows-latest, goos: windows, goarch: amd64, suffix: windows-amd64, ext: .exe }
          - { runner: macos-latest,   goos: darwin,  goarch: arm64, suffix: darwin-arm64,  ext: ''   }
          - { runner: ubuntu-latest,  goos: linux,   goarch: amd64, suffix: linux-amd64,   ext: ''   }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux WebKit dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 uses webkit2gtk-4.1; fall back to 4.0 for older runners
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config || \
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev pkg-config

      - name: Build headless agent binary (to embed in tray app)
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          cd apps/agent
          go build \
            -ldflags "-w -s -X main.Version=${{ github.ref_name }} -X main.BuildDate=$(date -u +%Y-%m-%d)" \
            -o cmd/tray/agent_bin${{ matrix.ext || '' }} \
            ./cmd/agent

      - name: Build tray app with Wails
        shell: bash
        run: |
          cd apps/agent/cmd/tray
          wails build \
            -platform ${{ matrix.goos }}/${{ matrix.goarch }} \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o timechamp-tray-${{ matrix.suffix }}${{ matrix.ext || '' }}

      - name: Upload to release
        shell: bash
        run: |
          # Wails places output in build/bin/ inside the project directory
          gh release upload "${{ github.ref_name }}" \
            apps/agent/cmd/tray/build/bin/timechamp-tray-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
