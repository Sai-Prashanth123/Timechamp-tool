<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeChamp Agent Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 2rem; width: 460px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .logo h1 { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; }
    .logo p { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
    hr { border: none; border-top: 1px solid #334155; margin: 1.2rem 0; }

    /* ── Form ── */
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: #94a3b8; margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.6rem 0.85rem;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; font-size: 0.875rem;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .hint { font-size: 0.72rem; color: #475569; margin-top: 0.35rem; }
    .btn {
      width: 100%; padding: 0.72rem;
      background: #3b82f6; color: white;
      border: none; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) { background: #2563eb; }
    .btn:disabled { background: #1e40af; cursor: not-allowed; opacity: 0.8; }
    .btn.secondary {
      background: #334155; margin-top: 1rem;
    }
    .btn.secondary:hover:not(:disabled) { background: #475569; }
    .inline-error {
      font-size: 0.78rem; color: #ef4444;
      margin-top: 0.5rem; display: none;
    }

    /* ── Steps panel ── */
    #steps-panel { display: none; }
    .steps-list { display: flex; flex-direction: column; gap: 0; }
    .step-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1e293b;
    }
    .step-row:last-child { border-bottom: none; }
    .step-icon {
      flex-shrink: 0; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }
    /* pending */
    .icon-pending {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #475569; background: transparent;
    }
    /* active spinner */
    .icon-active {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.35);
      border-top-color: #3b82f6;
      animation: spin 0.7s linear infinite;
    }
    /* done checkmark */
    .icon-done {
      width: 18px; height: 18px; border-radius: 50%;
      background: #22c55e;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-done::after {
      content: '';
      display: block; width: 5px; height: 9px;
      border: 2px solid white; border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    /* error X */
    .icon-error {
      width: 18px; height: 18px; border-radius: 50%;
      background: #ef4444;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: white; font-weight: 700; line-height: 1;
    }
    .icon-error::after { content: '✕'; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .step-body { flex: 1; min-width: 0; }
    .step-label {
      font-size: 0.85rem; font-weight: 600; color: #e2e8f0;
      text-transform: capitalize;
    }
    .step-label.pending { color: #475569; font-weight: 400; }
    .step-msg {
      font-size: 0.78rem; color: #94a3b8;
      margin-top: 2px; line-height: 1.45;
    }
    .step-msg.error-msg { color: #ef4444; }

    /* success banner */
    .success-banner {
      margin-top: 1.2rem; padding: 0.85rem 1rem;
      background: #052e16; border: 1px solid #14532d;
      border-radius: 8px; font-size: 0.82rem; color: #86efac;
      line-height: 1.5; display: none;
    }
    .countdown { font-weight: 700; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⏱</div>
    <div>
      <h1>TimeChamp Agent Setup</h1>
      <p>Register this device with your organisation</p>
    </div>
  </div>

  <hr>

  <!-- ── Form panel ── -->
  <div id="form-panel">
    <div class="field">
      <label for="apiUrl">API URL</label>
      <input id="apiUrl" type="url" value="https://api.timechamp.io/api/v1" autocomplete="off" />
      <div class="hint">Leave as default unless you are self-hosting</div>
    </div>

    <div class="field">
      <label for="token">Invite Token</label>
      <input id="token" type="password" placeholder="Paste your invite token here" autocomplete="off" />
      <div class="hint">Generate from Dashboard → Settings → Agent Setup → Generate Token</div>
    </div>

    <button class="btn" id="start-btn" onclick="startSetup()">
      Register &amp; Start Agent
    </button>
    <div class="inline-error" id="form-error"></div>
  </div>

  <!-- ── Steps panel ── -->
  <div id="steps-panel">
    <div class="steps-list" id="steps-list">
      <!-- rows injected by JS -->
    </div>
    <div class="success-banner" id="success-banner"></div>
    <button class="btn secondary" id="retry-btn" style="display:none" onclick="resetToForm()">
      Try again
    </button>
  </div>
</div>

<script>
  // Step definitions: key must match backend "step" values
  const STEP_DEFS = [
    { key: 'connect',  label: 'Connect'  },
    { key: 'register', label: 'Register' },
    { key: 'creds',    label: 'Credentials' },
    { key: 'install',  label: 'Install'  },
    { key: 'verify',   label: 'Verify'   },
    { key: 'done',     label: 'Done'     },
  ];

  // state: 'pending' | 'active' | 'done' | 'error'
  let stepState = {};
  let es = null; // EventSource

  function initStepRows() {
    stepState = {};
    STEP_DEFS.forEach(s => { stepState[s.key] = 'pending'; });

    const list = document.getElementById('steps-list');
    list.innerHTML = '';
    STEP_DEFS.forEach(s => {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.id = 'row-' + s.key;
      row.innerHTML =
        '<div class="step-icon" id="icon-' + s.key + '">' +
          '<div class="icon-pending"></div>' +
        '</div>' +
        '<div class="step-body">' +
          '<div class="step-label pending" id="label-' + s.key + '">' + escHtml(s.label) + '</div>' +
          '<div class="step-msg" id="msg-' + s.key + '" style="display:none"></div>' +
        '</div>';
      list.appendChild(row);
    });
  }

  function setStepState(key, state, message) {
    stepState[key] = state;
    const iconEl  = document.getElementById('icon-'  + key);
    const labelEl = document.getElementById('label-' + key);
    const msgEl   = document.getElementById('msg-'   + key);

    // icon
    if (state === 'pending') {
      iconEl.innerHTML = '<div class="icon-pending"></div>';
    } else if (state === 'active') {
      iconEl.innerHTML = '<div class="icon-active"></div>';
    } else if (state === 'done') {
      iconEl.innerHTML = '<div class="icon-done"></div>';
    } else if (state === 'error') {
      iconEl.innerHTML = '<div class="icon-error"></div>';
    }

    // label colour
    labelEl.className = 'step-label' + (state === 'pending' ? ' pending' : '');

    // sub-message
    if (message) {
      msgEl.textContent = message;
      msgEl.className   = 'step-msg' + (state === 'error' ? ' error-msg' : '');
      msgEl.style.display = 'block';
    } else if (state === 'pending') {
      msgEl.style.display = 'none';
    }
  }

  function startSetup() {
    const apiUrl = document.getElementById('apiUrl').value.trim();
    const token  = document.getElementById('token').value.trim();
    const errEl  = document.getElementById('form-error');

    if (!token) {
      errEl.textContent = 'Please paste your invite token.';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    // Switch to steps view
    document.getElementById('form-panel').style.display  = 'none';
    document.getElementById('steps-panel').style.display = 'block';
    document.getElementById('success-banner').style.display = 'none';
    document.getElementById('retry-btn').style.display   = 'none';

    initStepRows();
    openStream(apiUrl, token);
  }

  function openStream(apiUrl, token) {
    if (es) { es.close(); es = null; }

    const url = '/register-stream?apiUrl=' + encodeURIComponent(apiUrl) +
                '&token='  + encodeURIComponent(token);
    es = new EventSource(url);

    es.onmessage = function(evt) {
      let data;
      try { data = JSON.parse(evt.data); } catch(e) { return; }

      if (data.error) {
        setStepState(data.step, 'error', data.error);
        es.close(); es = null;
        document.getElementById('retry-btn').style.display = 'block';
        return;
      }

      if (data.step === 'done') {
        // Mark all preceding steps done
        let hitDone = false;
        STEP_DEFS.forEach(s => {
          if (s.key === 'done') { hitDone = true; }
          if (!hitDone && stepState[s.key] !== 'error') {
            setStepState(s.key, 'done', null);
          }
        });
        setStepState('done', 'done', data.msg || 'Setup complete.');
        es.close(); es = null;
        showSuccessBanner(data.msg || 'Agent is running! This window will close in 4 seconds.');
        return;
      }

      // Normal progress event
      setStepState(data.step, 'active', data.msg || '');
    };

    es.onerror = function() {
      if (es) { es.close(); es = null; }
      // Only show error if connect step not already passed
      if (stepState['connect'] !== 'done' && stepState['connect'] !== 'error') {
        setStepState('connect', 'error',
          'Connection lost — cannot reach the setup server. Check that the agent process is still running.');
      } else {
        // Find first active step and mark it error
        const activeKey = STEP_DEFS.map(s => s.key).find(k => stepState[k] === 'active');
        if (activeKey) {
          setStepState(activeKey, 'error', 'Connection lost unexpectedly. Try again.');
        }
      }
      document.getElementById('retry-btn').style.display = 'block';
    };
  }

  function showSuccessBanner(msg) {
    const banner = document.getElementById('success-banner');
    banner.style.display = 'block';

    let secs = 4;
    function render() {
      banner.innerHTML = escHtml(msg) +
        (secs > 0 ? ' <span class="countdown">(closing in ' + secs + 's)</span>' : '');
    }
    render();
    const iv = setInterval(function() {
      secs--;
      render();
      if (secs <= 0) {
        clearInterval(iv);
        window.close();
      }
    }, 1000);
  }

  function resetToForm() {
    if (es) { es.close(); es = null; }
    document.getElementById('steps-panel').style.display = 'none';
    document.getElementById('form-panel').style.display  = 'block';
    document.getElementById('form-error').style.display  = 'none';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
